<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Gamepad Input Diagnostics - Classic Slow Fall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #062016; 
            color: #e6edf3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .dot-centered {
            transform: translate(-50%, -50%);
        }
        /* 移除 transition 让 JS 控制的回落看起来更 raw 更像 old visualizer */
        .peak-marker {
            pointer-events: none;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4ade80',
                        'gh-panel': '#0b2e1f',
                    }
                }
            }
        }
    </script>
</head>
<body class="p-4">

    <div class="w-full max-w-3xl bg-gh-panel rounded-xl shadow-2xl flex flex-col items-center space-y-4 p-6 border border-green-900/50"> 
        
        <div class="w-full text-center border-b border-green-800/30 pb-4">
            <h1 class="text-xl font-bold text-white mb-2">Gamepad Diagnostics <span class="text-primary text-xs uppercase ml-2 px-2 py-0.5 border border-primary rounded">Classic Peak Fall</span></h1>
            <div id="deviceName" class="text-primary font-mono text-sm bg-black/50 p-2 rounded border border-green-900/50 break-all">
                No Device Detected
            </div>
        </div>

        <p id="gamepadStatus" class="text-sm font-semibold text-orange-400 w-full text-center p-2 rounded-lg border border-orange-500/30 bg-orange-900/20">
            ⚠️ Waiting for input... Press any button to initialize.
        </p>

        <div class="w-full">
            <h3 class="text-md font-bold text-green-500/60 mb-2 uppercase tracking-wider">Axis Output</h3>
            <div id="diagnostics" class="space-y-4 font-mono bg-black/40 p-5 rounded-lg border border-green-900/30">
                <p class="text-gray-600 italic">Waiting for axis data...</p>
            </div>
        </div>

        <div class="w-full">
            <h3 class="text-md font-bold text-green-500/60 mb-2 uppercase tracking-wider">Button Output</h3>
            <div id="buttonDiagnostics" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3 p-4 bg-black/40 rounded-lg border border-green-900/30">
                <p class="text-gray-600 col-span-full italic text-center">No buttons detected.</p>
            </div>
        </div>
        
    </div>

    <script>
        // --- Tuning ---
        // 调小这个值会让回落变得更慢 (Slow Fall)
        const PEAK_FALL_SPEED = 0.45; 
        
        let gamepadIndex = null;
        let axisState = []; 

        const nameEl = document.getElementById('deviceName');
        const statusEl = document.getElementById('gamepadStatus');
        const diagnosticsEl = document.getElementById('diagnostics');
        const buttonDiagnosticsEl = document.getElementById('buttonDiagnostics'); 
        
        window.addEventListener("gamepadconnected", (e) => {
            gamepadIndex = e.gamepad.index;
            updateStatus(e.gamepad);
        });

        window.addEventListener("gamepaddisconnected", (e) => {
            if (gamepadIndex === e.gamepad.index) {
                gamepadIndex = null;
                resetUI();
            }
        });

        function updateStatus(gp) {
            nameEl.textContent = gp.id;
            statusEl.textContent = `✅ Active: Index ${gp.index}`;
            statusEl.className = "text-sm font-semibold text-green-400 w-full text-center p-2 rounded-lg border border-green-500/50 bg-green-900/30";
        }

        function resetUI() {
            nameEl.textContent = "No Device Detected";
            statusEl.textContent = "⚠️ Gamepad Disconnected.";
            statusEl.className = "text-sm font-semibold text-red-400 w-full text-center p-2 rounded-lg border border-red-500/30 bg-red-900/20";
            diagnosticsEl.innerHTML = '<p class="text-gray-600 italic">Waiting for axis data...</p>';
            buttonDiagnosticsEl.innerHTML = '<p class="text-gray-600 col-span-full italic text-center">No buttons detected.</p>';
            axisState = [];
        }

        function generateAxisHtml(i, rawValue, currentPeakPos) {
            const normPos = ((rawValue + 1) / 2) * 100;
            const peakLeft = currentPeakPos.toFixed(2) + '%';

            return `
                <div class="axis-entry flex flex-col space-y-1">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-[10px] text-primary font-bold">AXIS ${i}</span>
                        <span class="text-[10px] text-green-100 font-mono">${rawValue.toFixed(4)}</span>
                    </div>
                    
                    <div class="w-full h-4 bg-black/60 rounded-full relative overflow-visible border border-green-900/20">
                        <!-- Middle Line -->
                        <div class="absolute inset-y-0 left-1/2 w-px bg-green-900/40"></div>
                        
                        <!-- The White Peak Marker (Floating above the dot) -->
                        <div class="peak-marker absolute top-[-3px] bottom-[-3px] w-[2px] bg-white shadow-[0_0_8px_white] z-20" 
                             style="left: ${peakLeft}"></div>

                        <!-- The Green Absolute Position Dot -->
                        <div class="absolute top-1/2 w-4 h-4 bg-primary rounded-full dot-centered shadow-lg shadow-primary/40 z-10" 
                             style="left: ${normPos}%"></div>
                    </div>
                </div>
            `;
        }

        function updateLoop() {
            const gamepads = navigator.getGamepads();
            const gp = gamepads[gamepadIndex];

            if (gp) {
                if (axisState.length !== gp.axes.length) {
                    axisState = Array.from({ length: gp.axes.length }, (_, i) => ({
                        peakPos: ((gp.axes[i] + 1) / 2) * 100
                    }));
                }

                let axisHtml = '';
                gp.axes.forEach((val, i) => {
                    let state = axisState[i];
                    const currentPos = ((val + 1) / 2) * 100;

                    // --- Peak Logic ---
                    // 记录离中心更远的位置 (Outward Peak)
                    const distActual = Math.abs(currentPos - 50);
                    const distPeak = Math.abs(state.peakPos - 50);

                    if (distActual > distPeak) {
                        state.peakPos = currentPos;
                    } else {
                        // Slow Fall: 慢慢向当前物理位置“掉”回去
                        if (state.peakPos > currentPos) {
                            state.peakPos = Math.max(currentPos, state.peakPos - PEAK_FALL_SPEED);
                        } else if (state.peakPos < currentPos) {
                            state.peakPos = Math.min(currentPos, state.peakPos + PEAK_FALL_SPEED);
                        }
                    }

                    axisHtml += generateAxisHtml(i, val, state.peakPos);
                });
                diagnosticsEl.innerHTML = axisHtml;

                let btnHtml = '';
                gp.buttons.forEach((btn, i) => {
                    const fillHeight = (btn.value * 100).toFixed(0);
                    const isPressed = btn.pressed;
                    btnHtml += `
                        <div class="flex flex-col items-center">
                            <span class="text-[10px] text-green-700 mb-1">B${i}</span>
                            <div class="relative w-10 h-14 rounded-md border-2 ${isPressed ? 'border-primary' : 'border-green-900/50'} bg-black/40 overflow-hidden">
                                <div class="absolute bottom-0 left-0 right-0 bg-primary" style="height: ${fillHeight}%"></div>
                                <div class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-white z-10">${fillHeight}%</div>
                            </div>
                        </div>`;
                });
                buttonDiagnosticsEl.innerHTML = btnHtml;
            } else {
                for (let i = 0; i < gamepads.length; i++) {
                    if (gamepads[i]) {
                        gamepadIndex = i;
                        updateStatus(gamepads[i]);
                        break;
                    }
                }
            }
            requestAnimationFrame(updateLoop);
        }
        requestAnimationFrame(updateLoop);
    </script>
</body>
</html>
